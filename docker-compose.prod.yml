services:
  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: interdiscount-nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - interdiscount
    restart: unless-stopped

  # ── Laravel API (PHP-FPM) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: interdiscount-api
    expose:
      - "9000"
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - interdiscount
    restart: unless-stopped

  # ── Laravel Horizon (Queue Worker) ──
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: interdiscount-horizon
    command: php artisan horizon
    volumes:
      - app_storage:/var/www/html/storage
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - interdiscount
    restart: unless-stopped

  # ── Scheduler (cron) ──
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: interdiscount-scheduler
    command: sh -c "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"
    volumes:
      - app_storage:/var/www/html/storage
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - interdiscount
    restart: unless-stopped

  # ── MySQL 8.4 ──
  mysql:
    image: mysql:8.4
    container_name: interdiscount-mysql
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-interdiscount}
      MYSQL_USER: ${DB_USERNAME:-interdiscount}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interdiscount
    restart: unless-stopped

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: interdiscount-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interdiscount
    restart: unless-stopped

  # ── Meilisearch ──
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: interdiscount-meilisearch
    expose:
      - "7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - interdiscount
    restart: unless-stopped

volumes:
  app_public:
  app_storage:
  mysql_data:
  redis_data:
  meilisearch_data:

networks:
  interdiscount:
    driver: bridge
